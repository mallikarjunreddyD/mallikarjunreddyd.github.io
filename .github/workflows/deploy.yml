name: Deploy Jekyll site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install scholarly

      - name: Generate Google Scholar publications JSON
        continue-on-error: true
        run: |
          python3 scripts/update_scholar_publications.py

      - name: Verify publications JSON is non-empty
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          p = Path('_data/scholar_publications.json')
          data = json.loads(p.read_text(encoding='utf-8'))
          groups = len(data) if isinstance(data, list) else 0
          print('year_groups:', groups)
          if groups == 0:
            raise SystemExit('No publications extracted; check Google Scholar access.')
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll (GitHub Pages compatible)
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
